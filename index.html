<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すうじの がっこう</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0fdf4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #16a34a;
            font-size: 24px;
            margin-bottom: 10px;
        }

        #msg-box {
            background-color: white;
            border: 3px solid #4ade80;
            border-radius: 15px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 20px;
            min-height: 28px;
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        /* 最終ステージ用に少し画面を広げました */
        #stage {
            position: relative;
            width: 800px;
            height: 500px;
            background-color: white;
            border: 4px dashed #cbd5e1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* 「1」の球 */
        .ball-1 {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ff5a5f;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 3px #cf3a3e;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 4;
        }

        /* 「10」の袋 */
        .bag-10 {
            position: absolute;
            width: 50px;
            height: 60px;
            background-color: #3b82f6;
            color: white;
            border-radius: 12px 12px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px #1d4ed8;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 3;
        }
        .bag-10::before {
            content: '';
            position: absolute;
            top: -6px;
            width: 24px;
            height: 10px;
            background-color: #2563eb;
            border-radius: 3px;
        }

        /* 「100」の袋 */
        .bag-100 {
            position: absolute;
            width: 90px;
            height: 105px;
            background-color: #ec4899;
            color: white;
            border-radius: 20px 20px 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 5px #be185d;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
        }
        .bag-100::before {
            content: '';
            position: absolute;
            top: -10px;
            width: 45px;
            height: 16px;
            background-color: #db2777;
            border-radius: 6px;
        }

        /* 【追加】「1000」の超巨大な袋 */
        .bag-1000 {
            position: absolute;
            width: 200px;
            height: 230px;
            background-color: #eab308; /* ピカピカ輝く金色（黄色） */
            color: white;
            border-radius: 45px 45px 60px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            box-shadow: 0 10px #ca8a04;
            border: 4px solid #fef08a;
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* ドンッと弾むような登場 */
            z-index: 1;
        }
        .bag-1000::before {
            content: '';
            position: absolute;
            top: -24px;
            width: 100px;
            height: 35px;
            background-color: #ca8a04;
            border-radius: 12px;
        }

        .btn-container {
            margin-top: 20px;
            height: 60px;
        }

        button {
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px #e58200;
            background-color: #ff9f1c;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button:disabled {
            background-color: #cbd5e1;
            box-shadow: 0 4px #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>すうじの がっこう</h1>
    <div id="msg-box">ボタンを おしてね！</div>

    <div id="stage"></div>

    <div class="btn-container">
        <button id="btn-action" onclick="handleAction()">「1」のたまを だす</button>
    </div>

    <script>
        let ballCount = 0;
        let bag10Count = 0;
        let bag100Count = 0; // 【追加】100の袋のカウント
        
        const stage = document.getElementById('stage');
        const msgBox = document.getElementById('msg-box');
        const btnAction = document.getElementById('btn-action');

        function handleAction() {
            if (btnAction.innerText === "「10」の ふくろにする") {
                packTo10();
            } else if (btnAction.innerText === "「100」の ふくろにする") {
                packTo100();
            } else if (btnAction.innerText === "「1000」の 超おおきなふくろにする！") {
                packTo1000();
            } else if (btnAction.innerText === "もういちど あそぶ") {
                location.reload();
            } else {
                addBall();
            }
        }

        // 1. 球をだす
        function addBall() {
            ballCount++;
            updateMessage();

            const ball = document.createElement('div');
            ball.className = 'ball-1';
            ball.innerText = '1';

            const col = (ballCount - 1) % 2;
            const row = Math.floor((ballCount - 1) / 2);
            ball.style.left = `${30 + col * 40}px`;
            ball.style.top = `${60 + row * 40}px`;

            stage.appendChild(ball);

            if (ballCount === 10) {
                setButton("「10」の ふくろにする", "#3b82f6", "0 4px #1d4ed8");
                msgBox.innerText = "10こ たまったよ！ボタンを おして ふくろにいれよう！";
            }
        }

        // 2. 10の袋にする
        function packTo10() {
            btnAction.disabled = true;
            bag10Count++;

            const targetCol = (bag10Count - 1) % 2;
            const targetRow = Math.floor((bag10Count - 1) / 2);
            const targetLeft = 160 + targetCol * 65;
            const targetTop = 40 + targetRow * 90;

            const balls = document.querySelectorAll('.ball-1');
            balls.forEach((ball) => {
                ball.style.left = `${targetLeft + 10}px`;
                ball.style.top = `${targetTop + 15}px`;
                ball.style.opacity = '0.3';
            });

            setTimeout(() => {
                balls.forEach(ball => ball.remove());

                const bag10 = document.createElement('div');
                bag10.className = 'bag-10';
                bag10.innerText = '10';
                bag10.style.left = `${targetLeft}px`;
                bag10.style.top = `${targetTop}px`;
                stage.appendChild(bag10);

                ballCount = 0;

                if (bag10Count === 10) {
                    setButton("「100」の ふくろにする", "#ec4899", "0 4px #be185d");
                    msgBox.innerText = "「10」の ふくろが 10こ あつまったよ！ボタンを おしてみて！";
                } else {
                    setButton("「1」のたまを だす", "#ff9f1c", "0 4px #e58200");
                    updateMessage();
                }
                btnAction.disabled = false;
            }, 600);
        }

        // 3. 100の袋にする
        function packTo100() {
            btnAction.disabled = true;
            bag100Count++;

            const targetCol = (bag100Count - 1) % 5;
            const targetRow = Math.floor((bag100Count - 1) / 5);
            const targetLeft = 350 + targetCol * 85;
            const targetTop = 80 + targetRow * 160;

            const bags10 = document.querySelectorAll('.bag-10');
            bags10.forEach((bag) => {
                bag.style.left = `${targetLeft + 20}px`;
                bag.style.top = `${targetTop + 20}px`;
                bag.style.opacity = '0.3';
            });

            setTimeout(() => {
                bags10.forEach(bag => bag.remove());

                const bag100 = document.createElement('div');
                bag100.className = 'bag-100';
                bag100.innerText = '100';
                bag100.style.left = `${targetLeft}px`;
                bag100.style.top = `${targetTop}px`;
                stage.appendChild(bag100);

                bag10Count = 0;

                if (bag100Count === 10) {
                    setButton("「1000」の 超おおきなふくろにする！", "#eab308", "0 4px #ca8a04");
                    msgBox.innerText = "うわぁぁ！「100」の ふくろが 10こ（1000）になったよ！さいごの ボタンを おそう！";
                } else {
                    setButton("「1」のたまを だす", "#ff9f1c", "0 4px #e58200");
                    updateMessage();
                }
                btnAction.disabled = false;
            }, 700);
        }

        // 4. 【追加】1000の袋にする
        function packTo1000() {
            btnAction.disabled = true;
            msgBox.innerText = "いくよーーー！ 100が 10こ あつまると……！？";

            const targetLeft = 400;
            const targetTop = 120;

            const bag1000 = document.createElement('div');
            bag1000.className = 'bag-1000';
            bag1000.innerText = '1000';
            bag1000.style.left = `${targetLeft}px`;
            bag1000.style.top = `${targetTop}px`;
            stage.appendChild(bag1000);

            const bags100 = document.querySelectorAll('.bag-100');
            bags100.forEach((bag) => {
                bag.style.left = `${targetLeft + 50}px`;
                bag.style.top = `${targetTop + 60}px`;
                bag.style.opacity = '0.3';
            });

            setTimeout(() => {
                bags100.forEach(bag => bag.remove());

                bag1000.style.opacity = '1';
                bag1000.style.transform = 'scale(1)';

                msgBox.innerText = "✨すごーーーい！！✨ 「1000」の 超ウルトラおおきな ふくろの 完成だ！！";
                
                setTimeout(() => {
                    setButton("もういちど あそぶ", "#10b981", "0 4px #047857");
                    btnAction.disabled = false;
                }, 1500);
            }, 800);
        }

        // 共通ヘルパー関数
        function setButton(text, bgColor, boxShadow) {
            btnAction.innerText = text;
            btnAction.style.backgroundColor = bgColor;
            btnAction.style.boxShadow = boxShadow;
        }

        function updateMessage() {
            msgBox.innerText = `いまの ふくろ： 【10】が ${bag10Count}こ ｜ 【100】が ${bag100Count}こ`;
        }
    </script>

</body>
</html>
